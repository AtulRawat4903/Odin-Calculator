<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <h1>Odin Calculator</h1>

        <div class="calculator" aria-label="Calculator">

            <div id="display">
                <div id="previous-operand"></div>
                <div id="current-operand">0</div>
            </div>

            <div class="buttons">
                <div class="row">
                    <button class="btn clearbtn" data-action="clear">CLEAR</button>
                    <button class="btn deletebtn" data-action="delete">DELETE</button>
                </div>

                <div class="row">
                    <button class="btn" data-number="7">7</button>
                    <button class="btn" data-number="8">8</button>
                    <button class="btn" data-number="9">9</button>
                    <button class="btn" data-operator="/">÷</button>
                </div>

                <div class="row">
                    <button class="btn" data-number="4">4</button>
                    <button class="btn" data-number="5">5</button>
                    <button class="btn" data-number="6">6</button>
                    <button class="btn" data-operator="*">×</button>
                </div>

                <div class="row">
                    <button class="btn" data-number="1">1</button>
                    <button class="btn" data-number="2">2</button>
                    <button class="btn" data-number="3">3</button>
                    <button class="btn" data-operator="-">−</button>
                </div>

                <div class="row">
                    <button class="btn" data-number=".">.</button>
                    <button class="btn" data-number="0">0</button>
                    <button class="btn equalsbtn" data-action="equals">=</button>
                    <button class="btn" data-operator="+">+</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>
            Copyright &copy; 2026
        </p>

        <a href="https://github.com/AtulRawat4903" target="_blank" rel="noopener noreferrer">Github</a>
    </footer>
</body>

</html>
